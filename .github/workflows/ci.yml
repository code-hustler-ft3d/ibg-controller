name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-test:
    runs-on: ubuntu-24.04

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install host tools used by the Makefile
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends make unzip

      - name: make clean
        run: make clean

      - name: make (build agent jar + stage controller)
        run: make

      - name: make test (py_compile + agent manifest check + unit tests)
        run: make test

      - name: make release (build tarball)
        run: make release VERSION=${GITHUB_REF_NAME#v}

      - name: Verify tarball layout
        run: |
          tar -tzf dist/ibg-controller-*.tar.gz

      - name: Verify install.sh extracts cleanly
        run: |
          mkdir -p /tmp/install-test /tmp/install-dest
          cd /tmp/install-test
          tar -xzf $GITHUB_WORKSPACE/dist/ibg-controller-*.tar.gz
          cd ibg-controller-*
          DESTDIR=/tmp/install-dest ./install.sh
          test -f /tmp/install-dest/gateway-input-agent.jar
          test -f /tmp/install-dest/scripts/gateway_controller.py

      - name: Upload release tarball (artifact)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: release-tarball
          path: dist/ibg-controller-*.tar.gz

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release create "$TAG" dist/ibg-controller-*.tar.gz \
            --title "$TAG" \
            --notes "See [CHANGELOG.md](https://github.com/code-hustler-ft3d/ibg-controller/blob/main/CHANGELOG.md) for details." \
            --repo "$GITHUB_REPOSITORY"

  smoke-test-image:
    runs-on: ubuntu-24.04
    needs: build-and-test
    # Smoke-test in a Docker container that mirrors the target
    # runtime: Python 3 + pyatspi2 + ATK bridge. Verifies the module
    # loads with the real gi stack (not just mocked sys.modules).
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install build + runtime deps on the runner
        # The runner is ubuntu-24.04 — the same distro we previously
        # docker-run'd into for this smoke test. Running the smoke
        # directly on the runner drops an unreliable hop (docker's
        # NAT network couldn't reach archive.ubuntu.com on 2026-04-17,
        # failing the original docker-apt-install flow even though
        # the runner's own apt was fine).
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            make unzip \
            python3 python3-gi gir1.2-atspi-2.0 at-spi2-core

      - name: make
        run: make

      - name: Real-pyatspi2 module-load smoke test
        env:
          TWS_USERID: x
          TWS_PASSWORD: x
          TRADING_MODE: paper
        run: |
          python3 - <<'PY'
          import sys
          sys.path.insert(0, ".")
          import gateway_controller as gc
          print("module loaded, version check OK")
          print(f"  TRADING_MODE={gc.TRADING_MODE}")
          print(f"  APP_NAME_CANDIDATES={gc.APP_NAME_CANDIDATES}")
          print(f"  SAFE_DISMISS_BUTTONS has {len(gc.SAFE_DISMISS_BUTTONS)} entries")
          PY
